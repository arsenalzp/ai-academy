name: CI

on:
  push:
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: flake8 src tests

      - name: Pipeline tests
        run: pytest -q tests/test_pipeline.py

      - name: CI/CD smoke tests
        run: pytest -q tests/test_cicd_smoke.py

      - name: Validation pipeline tests
        run: pytest -q tests/test_validation_layer.py

  policy-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate policy YAML syntax
        run: python src/validate_policies.py

  structure-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce folder structure
        run: python src/check_structure.py

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - quality-gates
      - policy-validation
      - structure-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t eurohealth-helpdesk:ci .
